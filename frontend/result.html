
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaEcoSort - Results</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">
            NovaEcoSort
        </div>

        <nav>

            <a href="home.html">Home</a>
            <a href="analyze.html">Analyze</a>
            <a href="about.html">About</a>

        </nav>

    </header>

    <!-- Result Container -->

    <section class="results-page">

        <div class="results-card">

            <h1>Results</h1>

            <div class="results-content">

                <!-- Left Side -->

                <div class="image-preview">

                    <img id="resultImage" alt="Analysed Image">

                    <!-- If no image is available use this -->
                    <!-- <p>Analysed Image</p> -->

                </div>

                <!-- Right Side -->

                <div class="result-details">

                    <div class="section">

                        <h2>Waste Type Detected</h2>

                        <span class="plastic-badge" id="wasteType">
                        </span>

                    </div>

                    <div class="section">

                        <h2>Confidence Score</h2>

                        <span class="confidence-badge" id="confidence"></span>

                    </div>

                    <div class="section">

                        <h2>Recycling Instructions</h2>

                        <ul id="instructions"></ul>

                    </div>

                    <div class="section">

                        <h2>🌱 Environmental Impact</h2>

                        <div class="impact-box" id="impact"></div>

                    </div>

                    <button class="upload-btn" onclick="window.location.href='analyze.html'">
                        Upload New Image
                    </button>

                </div>

            </div>

        </div>

    </section>

    <script>

    const prediction = localStorage.getItem("prediction");
    const image = localStorage.getItem("image");

    document.getElementById("resultImage").src = image;
    document.getElementById("wasteType").textContent = prediction;

    if(prediction === "Recyclable"){

        document.getElementById("confidence").textContent = "High";

        document.getElementById("instructions").innerHTML = `
            <li>Clean the waste item.</li>
            <li>Place it in the recycling bin.</li>
            <li>Avoid mixing with organic waste.</li>
        `;

        document.getElementById("impact").textContent =
        "Recycling conserves natural resources, saves energy, and reduces landfill waste.";

    }
    else{

        document.getElementById("confidence").textContent = "High";

        document.getElementById("instructions").innerHTML = `
            <li>Dispose in the organic waste bin.</li>
            <li>Compost if possible.</li>
            <li>Keep separate from recyclable waste.</li>
        `;

        document.getElementById("impact").textContent =
        "Organic waste can be converted into compost, enriching soil and reducing methane emissions.";

    }

    </script>

</body>

</html>
